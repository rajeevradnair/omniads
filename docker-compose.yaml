services:
  postgres:
    image: postgres:16
    container_name: omniads-postgres
    environment:
      POSTGRES_DB: omniads
      POSTGRES_USER: omniads
      POSTGRES_PASSWORD: omniads
    ports:
      - "5432:5432"
    volumes:
      - ./sql/postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/postgres/seed_campaigns.sql:/docker-entrypoint-initdb.d/02_seed_campaigns.sql

  ads-gateway:
    build:
      context: .
      dockerfile: services/ads_gateway/Dockerfile
    container_name: omniads-ads-gateway
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=ads-gateway
      - CAMPAIGN_SERVICE_URL=http://campaign-service:8001
      - TARGETING_SERVICE_URL=http://targeting-service:8002
      - VAST_SERVICE_URL=http://vast-service:8003
      - CANDIDATE_SERVICE_URL=http://candidate-service:8004
      - FREQUENCY_CAP_SERVICE_URL=http://frequency-cap-service:8005
      - BUDGET_PACING_SERVICE_URL=http://budget-pacing-service:8006
      - RANKING_SERVICE_URL=http://ranking-service:8007
      - EVENT_LOGGING_SERVICE_URL=http://event-logging-service:8008
    depends_on:
      - campaign-service
      - candidate-service
      - targeting-service
      - frequency-cap-service
      - budget-pacing-service
      - ranking-service
      - vast-service
      - event-logging-service

  campaign-service:
    build:
      context: .
      dockerfile: services/campaign_service/Dockerfile
    container_name: omniads-campaign-service
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=campaign-service
      - DATABASE_URL=postgresql://omniads:omniads@postgres:5432/omniads
    depends_on:
      - postgres

  targeting-service:
    build:
      context: .
      dockerfile: services/targeting_service/Dockerfile
    container_name: omniads-targeting-service
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=targeting-service
  
  vast-service:
    build:
      context: .
      dockerfile: services/vast_service/Dockerfile
    container_name: omniads-vast-service
    ports:
      - "8003:8003"
    environment:
      - SERVICE_NAME=vast-service

  candidate-service:
    build:
      context: .
      dockerfile: services/candidate_service/Dockerfile
    container_name: omniads-candidate-service
    ports:
      - "8004:8004"
    environment:
      - SERVICE_NAME=candidate-service
  
  frequency-cap-service:
    build:
      context: .
      dockerfile: services/frequency_cap_service/Dockerfile
    container_name: omniads-frequency-cap-service
    ports:
      - "8005:8005"
    environment:
      - SERVICE_NAME=frequency-cap-service

  budget-pacing-service:
    build:
      context: .
      dockerfile: services/budget_pacing_service/Dockerfile
    container_name: omniads-budget-pacing-service
    ports:
      - "8006:8006"
    environment:
      - SERVICE_NAME=budget-pacing-service

  ranking-service:
    build:
      context: .
      dockerfile: services/ranking_service/Dockerfile
    container_name: omniads-ranking-service
    ports:
      - "8007:8007"
    environment:
      - SERVICE_NAME=ranking-service

  event-logging-service:
    build:
      context: .
      dockerfile: services/event_logging_service/Dockerfile
    container_name: omniads-event-logging-service
    ports:
      - "8008:8008"
    volumes:
      - ./data/synthetic_events:/app/data/synthetic_events
    environment:
      - SERVICE_NAME=event-logging-service